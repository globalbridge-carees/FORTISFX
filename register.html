<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Create Account - FortisFX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1322 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: rgba(20, 25, 40, 0.95);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00c853 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo a {
            text-decoration: none;
        }

        .title {
            text-align: center;
            margin-bottom: 28px;
        }

        .title h2 {
            color: white;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .title p {
            color: #6b7280;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00c853;
            background: rgba(15, 20, 35, 1);
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-row .input-group {
            flex: 1;
        }

        .terms {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terms input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00c853;
        }

        .terms label {
            color: #9ca3af;
            font-size: 13px;
        }

        .terms a {
            color: #00c853;
            text-decoration: none;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00c853 0%, #009624 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .register-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(0, 200, 83, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #6b7280;
            font-size: 14px;
        }

        .login-link a {
            color: #00c853;
            text-decoration: none;
            font-weight: 600;
        }

        .password-requirements {
            font-size: 11px;
            color: #6b7280;
            margin-top: 5px;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .register-container {
                padding: 28px 20px;
            }
            
            .input-row {
                flex-direction: column;
                gap: 0;
            }
            
            .title h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <a href="index.html">
                <h1>FORTISFX</h1>
            </a>
        </div>
        
        <div class="title">
            <h2>Create Account</h2>
            <p>Start trading with strength</p>
        </div>

        <form id="registerForm">
            <div class="input-row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="John" required>
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="trader@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required>
                <div class="password-requirements">Minimum 8 characters</div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <div class="terms">
                <input type="checkbox" id="termsCheckbox" required>
                <label>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            </div>

            <button type="submit" class="register-btn">Create Free Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="index.html">Log In</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            // Validation
            if (!firstName || !lastName || !email || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }
            
            if (!termsChecked) {
                alert('Please agree to the Terms of Service');
                return;
            }
            
            // Store user info (temporary - will use database later)
            localStorage.setItem('fortisfx_user', JSON.stringify({
                firstName: firstName,
                lastName: lastName,
                email: email
            }));
            
            alert('Account created successfully! Please log in.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
