<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bot Control - FortisFX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0e1a;
            color: white;
        }

        .header {
            background: rgba(15, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo h2 {
            font-size: 22px;
            background: linear-gradient(135deg, #ffffff 0%, #00c853 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #00c853;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .balance {
            background: rgba(0, 200, 83, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            color: #9ca3af;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Bot Status Banner */
        .bot-status {
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1322 100%);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .status-info h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-badge.active {
            background: rgba(0, 200, 83, 0.2);
            color: #00c853;
        }

        .status-badge.inactive {
            background: rgba(156, 163, 175, 0.2);
            color: #9ca3af;
        }

        .status-badge.locked {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
        }

        .bot-controls {
            display: flex;
            gap: 12px;
        }

        .start-btn {
            background: linear-gradient(135deg, #00c853 0%, #009624 100%);
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .stop-btn {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid #ff3b30;
            padding: 12px 28px;
            border-radius: 12px;
            color: #ff3b30;
            font-weight: 600;
            cursor: pointer;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(20, 25, 40, 0.8);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #00c853;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* Cards */
        .card {
            background: rgba(20, 25, 40, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 600;
            font-size: 18px;
        }

        .card-body {
            padding: 24px;
        }

        /* Settings */
        .setting-group {
            margin-bottom: 24px;
        }

        .setting-label {
            display: block;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .setting-select, .setting-input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .setting-select:focus, .setting-input:focus {
            outline: none;
            border-color: #00c853;
        }

        .risk-slider {
            width: 100%;
            margin: 10px 0;
        }

        .risk-value {
            text-align: center;
            color: #00c853;
            font-weight: 600;
        }

        /* Strategy List */
        .strategy-item {
            background: rgba(15, 20, 35, 0.6);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .strategy-item:hover {
            border-color: rgba(0, 200, 83, 0.3);
        }

        .strategy-item.selected {
            border-color: #00c853;
            background: rgba(0, 200, 83, 0.1);
        }

        .strategy-name {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .strategy-desc {
            font-size: 12px;
            color: #6b7280;
        }

        /* Save Button */
        .save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00c853 0%, #009624 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        /* Performance */
        .performance-stats {
            margin-bottom: 20px;
        }

        .perf-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Locked Overlay */
        .locked-overlay {
            text-align: center;
            padding: 60px 20px;
        }

        .locked-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .upgrade-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        /* Mobile */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .bot-status {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h2>FORTISFX</h2>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="#" class="active">Bot Control</a>
            <a href="deposit.html">Deposit</a>
            <a href="withdraw.html">Withdraw</a>
            <a href="#">History</a>
        </div>
        <div class="user-info">
            <div class="balance">Balance: <span>$10,000.00</span></div>
            <a href="index.html" class="logout-btn">Logout</a>
        </div>
    </div>

    <div class="container" id="app">
        <!-- This will be filled by JavaScript based on subscription status -->
    </div>

    <script>
        // Check subscription status
        let subscriptionStatus = localStorage.getItem('fortisfx_subscription') || 'free';
        let botActive = false;
        let botStats = {
            totalTrades: 47,
            winRate: 68,
            totalProfit: 342.50,
            todayTrades: 12
        };
        
        // Bot configuration
        let botConfig = {
            strategy: 'momentum',
            riskPerTrade: 2,
            maxDailyTrades: 20,
            pairs: ['EUR/USD', 'GBP/USD'],
            stopLoss: 1.5,
            takeProfit: 3.0
        };
        
        const app = document.getElementById('app');
        
        function renderLockedView() {
            return `
                <div class="card">
                    <div class="locked-overlay">
                        <div class="locked-icon">🔒</div>
                        <h2>Bot Access Locked</h2>
                        <p style="color: #6b7280; margin-top: 12px;">Upgrade to Premium or Pro to unlock the<br>FortisFX Auto Trading Bot</p>
                        <a href="subscription.html" class="upgrade-link">⭐ UPGRADE NOW</a>
                    </div>
                </div>
            `;
        }
        
        function renderBotActiveView() {
            const planText = subscriptionStatus === 'pro' ? 'PRO' : 'PREMIUM';
            return `
                <div class="bot-status">
                    <div class="status-info">
                        <h3>🤖 FortisFX Trading Bot</h3>
                        <p style="color: #6b7280; font-size: 14px;">${planText} Plan Active</p>
                        <span class="status-badge ${botActive ? 'active' : 'inactive'}">${botActive ? '● BOT RUNNING' : '○ BOT STOPPED'}</span>
                    </div>
                    <div class="bot-controls">
                        ${!botActive ? '<button class="start-btn" id="startBotBtn">▶ START BOT</button>' : '<button class="stop-btn" id="stopBotBtn">⏹ STOP BOT</button>'}
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${botStats.totalTrades}</div>
                        <div class="stat-label">Total Trades</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${botStats.winRate}%</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">+$${botStats.totalProfit}</div>
                        <div class="stat-label">Total Profit</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${botStats.todayTrades}</div>
                        <div class="stat-label">Today's Trades</div>
                    </div>
                </div>
                
                <div class="main-grid">
                    <!-- Left Column - Settings -->
                    <div class="card">
                        <div class="card-header">⚙️ Bot Configuration</div>
                        <div class="card-body">
                            <div class="setting-group">
                                <label class="setting-label">Trading Strategy</label>
                                <select class="setting-select" id="strategySelect">
                                    <option value="momentum" ${botConfig.strategy === 'momentum' ? 'selected' : ''}>Momentum Strategy</option>
                                    <option value="scalping" ${botConfig.strategy === 'scalping' ? 'selected' : ''}>Scalping Strategy</option>
                                    <option value="trend" ${botConfig.strategy === 'trend' ? 'selected' : ''}>Trend Following</option>
                                    <option value="grid" ${botConfig.strategy === 'grid' ? 'selected' : ''}>Grid Trading</option>
                                </select>
                            </div>
                            
                            <div class="setting-group">
                                <label class="setting-label">Risk per Trade (%)</label>
                                <input type="range" class="risk-slider" id="riskSlider" min="0.5" max="5" step="0.5" value="${botConfig.riskPerTrade}">
                                <div class="risk-value" id="riskValue">${botConfig.riskPerTrade}%</div>
                            </div>
                            
                            <div class="setting-group">
                                <label class="setting-label">Max Daily Trades</label>
                                <input type="number" class="setting-input" id="maxTrades" value="${botConfig.maxDailyTrades}">
                            </div>
                            
                            <div class="setting-group">
                                <label class="setting-label">Currency Pairs</label>
                                <select class="setting-select" id="pairsSelect" multiple size="3">
                                    <option value="EUR/USD" ${botConfig.pairs.includes('EUR/USD') ? 'selected' : ''}>EUR/USD</option>
                                    <option value="GBP/USD" ${botConfig.pairs.includes('GBP/USD') ? 'selected' : ''}>GBP/USD</option>
                                    <option value="USD/JPY" ${botConfig.pairs.includes('USD/JPY') ? 'selected' : ''}>USD/JPY</option>
                                    <option value="AUD/USD" ${botConfig.pairs.includes('AUD/USD') ? 'selected' : ''}>AUD/USD</option>
                                </select>
                                <small style="color: #6b7280; font-size: 11px;">Hold Ctrl/Cmd to select multiple</small>
                            </div>
                            
                            <div class="setting-group">
                                <label class="setting-label">Stop Loss (%)</label>
                                <input type="number" class="setting-input" id="stopLoss" step="0.5" value="${botConfig.stopLoss}">
                            </div>
                            
                            <div class="setting-group">
                                <label class="setting-label">Take Profit (%)</label>
                                <input type="number" class="setting-input" id="takeProfit" step="0.5" value="${botConfig.takeProfit}">
                            </div>
                            
                            <button class="save-btn" id="saveConfigBtn">💾 Save Configuration</button>
                        </div>
                    </div>
                    
                    <!-- Right Column - Strategies & Performance -->
                    <div class="card">
                        <div class="card-header">📊 Performance</div>
                        <div class="card-body">
                            <div class="performance-stats">
                                <div class="perf-row">
                                    <span>Today's P&L:</span>
                                    <span style="color: #00c853;">+$156.30</span>
                                </div>
                                <div class="perf-row">
                                    <span>This Week:</span>
                                    <span style="color: #00c853;">+$487.20</span>
                                </div>
                                <div class="perf-row">
                                    <span>Best Trade:</span>
                                    <span style="color: #00c853;">+$89.50</span>
                                </div>
                                <div class="perf-row">
                                    <span>Worst Trade:</span>
                                    <span style="color: #ff3b30;">-$24.30</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function render() {
            if (subscriptionStatus === 'free') {
                app.innerHTML = renderLockedView();
            } else {
                app.innerHTML = renderBotActiveView();
                attachBotEventListeners();
            }
        }
        
        function attachBotEventListeners() {
            // Start bot button
            const startBtn = document.getElementById('startBotBtn');
            if (startBtn) {
                startBtn.addEventListener('click', function() {
                    botActive = true;
                    render();
                    alert('🤖 Bot Started! The bot will now analyze markets and execute trades automatically.');
                });
            }
            
            // Stop bot button
            const stopBtn = document.getElementById('stopBotBtn');
            if (stopBtn) {
                stopBtn.addEventListener('click', function() {
                    botActive = false;
                    render();
                    alert('⏹ Bot Stopped. All active positions will remain open but no new trades will be placed.');
                });
            }
            
            // Risk slider
            const riskSlider = document.getElementById('riskSlider');
            const riskValue = document.getElementById('riskValue');
            if (riskSlider && riskValue) {
                riskSlider.addEventListener('input', function() {
                    riskValue.innerText = this.value + '%';
                    botConfig.riskPerTrade = parseFloat(this.value);
                });
            }
            
            // Save config button
            const saveBtn = document.getElementById('saveConfigBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', function() {
                    const strategy = document.getElementById('strategySelect').value;
                    const maxTrades = document.getElementById('maxTrades').value;
                    const pairsSelect = document.getElementById('pairsSelect');
                    const selectedPairs = Array.from(pairsSelect.selectedOptions).map(opt => opt.value);
                    const stopLoss = document.getElementById('stopLoss').value;
                    const takeProfit = document.getElementById('takeProfit').value;
                    
                    botConfig.strategy = strategy;
                    botConfig.maxDailyTrades = parseInt(maxTrades);
                    botConfig.pairs = selectedPairs;
                    botConfig.stopLoss = parseFloat(stopLoss);
                    botConfig.takeProfit = parseFloat(takeProfit);
                    
                    alert('✅ Bot configuration saved successfully!');
                });
            }
        }
        
        // Initial render
        render();
    </script>
</body>
</html>
