<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FortisFX - Login | Professional Trading Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1322 50%, #0a0c15 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 200, 83, 0.08) 0%, transparent 50%);
            pointer-events: none;
            top: 0;
            left: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(0, 200, 83, 0.05) 0%, transparent 60%);
            pointer-events: none;
            top: 0;
            left: 0;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            top: 0;
            left: 0;
        }

        .particle {
            position: absolute;
            background: rgba(0, 200, 83, 0.15);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.6; }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Main Card */
        .login-card {
            background: rgba(18, 22, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(0, 200, 83, 0.2);
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 200, 83, 0.1);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(0, 200, 83, 0.4);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 200, 83, 0.2);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #00c853, #009624);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 200, 83, 0.3);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #00c853);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .tagline {
            color: #6b7280;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Badge */
        .badge {
            display: inline-block;
            background: rgba(0, 200, 83, 0.15);
            border: 1px solid rgba(0, 200, 83, 0.3);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #00c853;
            margin-bottom: 24px;
        }

        /* Form */
        .form-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(15, 20, 35, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #00c853;
            background: rgba(15, 20, 35, 1);
            box-shadow: 0 0 0 3px rgba(0, 200, 83, 0.1);
        }

        .input-field::placeholder {
            color: #4b5563;
        }

        /* Options Row */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #9ca3af;
        }

        .checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #00c853;
        }

        .forgot-link {
            color: #00c853;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00c853, #009624);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 200, 83, 0.4);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        /* Register Link */
        .register-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .register-text {
            color: #6b7280;
            font-size: 14px;
        }

        .register-link {
            color: #00c853;
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: all 0.2s;
        }

        .register-link:hover {
            text-decoration: underline;
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Loading State */
        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            body {
                padding: 20px 16px;
            }
            
            .login-card {
                padding: 28px 20px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .logo-text {
                font-size: 26px;
            }

            .options-row {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            
            .input-field {
                padding: 12px 12px 12px 44px;
                font-size: 14px;
            }
            
            .input-icon {
                font-size: 16px;
                left: 14px;
            }
        }
        
        /* Small height devices */
        @media (max-height: 600px) {
            body {
                padding: 20px;
            }
            .login-card {
                padding: 24px 20px;
            }
            .logo-section {
                margin-bottom: 20px;
            }
            .form-group {
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon">F</div>
                    <div class="logo-text">FORTISFX</div>
                </div>
                <div class="tagline">Trade with Strength</div>
            </div>

            <!-- Badge -->
            <div style="text-align: center;">
                <div class="badge">🔒 SECURE TRADING PLATFORM</div>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                ⚠️ Invalid email or password. Please try again.
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="input-label">EMAIL ADDRESS</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" class="input-field" id="email" placeholder="trader@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="input-label">PASSWORD</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" class="input-field" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="options-row">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">LOG IN</button>
            </form>

            <!-- Register Link -->
            <div class="register-section">
                <span class="register-text">Don't have an account?</span>
                <a href="register.html" class="register-link">Create Account →</a>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = 15 + Math.random() * 15 + 's';
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        // Login function
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            // Validate inputs
            if (!email || !password) {
                errorMsg.textContent = '⚠️ Please enter both email and password.';
                errorMsg.classList.add('show');
                
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
                return;
            }
            
            // Demo credentials check
            const isValid = (email === 'demo@fortisfx.com' && password === 'demo123');
            
            // Also allow any email with password length > 3 for testing
            const isTestValid = (email.length > 3 && password.length > 3);
            
            if (isValid || isTestValid) {
                // Show loading state
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
                
                // Store user info
                const userData = {
                    email: email,
                    name: email.split('@')[0],
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('fortisfx_user', JSON.stringify(userData));
                
                // Store demo balance if not exists
                if (!localStorage.getItem('fortisfx_real_balance')) {
                    localStorage.setItem('fortisfx_real_balance', '0');
                }
                
                // Simulate network delay
                setTimeout(() => {
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                errorMsg.textContent = '⚠️ Invalid email or password. Please try again.';
                errorMsg.classList.add('show');
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
        });
        
        // Remove error when typing
        document.getElementById('email').addEventListener('input', function() {
            document.getElementById('errorMessage').classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMessage').classList.remove('show');
        });
        
        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
